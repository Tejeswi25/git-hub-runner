name : My First Workflow 
on: push
jobs: 
  first_job:
    runs-on: ubuntu-latest 
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4 

    - name: List and Read file
      run: |
        echo "My first Gihub Actions Job"
        ls -ltra
        cat README.md
    - name: Generate ASCII Artwork 
      run: cosway -f dragon "Run for cower, I am a Dragon" >> dragon.txt 
      